<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamCast // P2P Camera Mirror</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #0b0f19;
            --panel: #151d30;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text: #f8fafc;
            --text-muted: #64748b;
            --border: #24324f;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .view-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2.5rem;
        }

        @media (min-width: 768px) {
            .view-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .card {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/10;
            background: #020617;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .placeholder-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            padding: 1.5rem;
            text-align: center;
        }

        .action-area {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: auto;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.85rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        button:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .pin-display {
            background: #020617;
            border: 1px dashed var(--accent);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            display: none;
        }

        .pin-number {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 0.25em;
            color: #60a5fa;
            margin-top: 0.25rem;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
        }

        input[type="text"] {
            flex: 1;
            background: #020617;
            border: 1px solid var(--border);
            color: white;
            padding: 0.85rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.1em;
            transition: border 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        .status-badge {
            font-size: 0.85rem;
            color: var(--success);
            font-weight: 600;
            text-align: center;
            display: none;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>StreamCast</h1>
            <p>Instant peer-to-peer camera mirroring via simple 4-digit pairing</p>
        </header>

        <div class="view-grid">
            <div class="card">
                <div class="card-title">1. Broadcast Device</div>
                <div class="video-wrapper">
                    <div class="placeholder-text" id="local-placeholder">Camera inactive. Click button below to start broadcasting.</div>
                    <video id="localVideo" autoplay playsinline muted></video>
                </div>
                
                <div class="action-area">
                    <button id="genCodeBtn">Generate Cam Code</button>
                    <div class="pin-display" id="pinDisplay">
                        <span style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase;">Your Pairing PIN</span>
                        <div class="pin-number" id="pinValue">0000</div>
                    </div>
                    <div class="status-badge" id="senderStatus">✓ Remote device connected</div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">2. Receiver Device</div>
                <div class="video-wrapper">
                    <div class="placeholder-text" id="remote-placeholder">Awaiting connection. Enter a broadcast PIN below.</div>
                    <video id="remoteVideo" autoplay playsinline></video>
                </div>

                <div class="action-area">
                    <div class="input-group">
                        <input type="text" id="pinInput" placeholder="Enter 4-Digit PIN" maxlength="4">
                        <button id="connectBtn">Connect</button>
                    </div>
                    <div class="status-badge" id="receiverStatus">✓ Viewing live feed</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let localStream = null;
        let peer = null;

        const genCodeBtn = document.getElementById('genCodeBtn');
        const pinDisplay = document.getElementById('pinDisplay');
        const pinValue = document.getElementById('pinValue');
        const localVideo = document.getElementById('localVideo');
        const localPlaceholder = document.getElementById('local-placeholder');
        const senderStatus = document.getElementById('senderStatus');

        const pinInput = document.getElementById('pinInput');
        const connectBtn = document.getElementById('connectBtn');
        const remoteVideo = document.getElementById('remoteVideo');
        const remotePlaceholder = document.getElementById('remote-placeholder');
        const receiverStatus = document.getElementById('receiverStatus');

        // Helper to generate a random 4-digit string
        function generate4DigitPin() {
            return Math.floor(1000 + Math.random() * 9000).toString();
        }

        // --- BROADCAST LOGIC ---
        genCodeBtn.addEventListener('click', async () => {
            try {
                // 1. Get Camera Stream
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                localVideo.srcObject = localStream;
                localPlaceholder.style.display = 'none';
                genCodeBtn.style.display = 'none';

                // 2. Generate a random 4 digit string as the unique Peer ID
                const customPin = generate4DigitPin();

                // 3. Initialize PeerJS connection framework using the 4-digit code
                peer = new Peer(customPin);

                peer.on('open', (id) => {
                    pinValue.innerText = id;
                    pinDisplay.style.display = 'block';
                });

                // 4. Wait for receiver to call us
                peer.on('call', (call) => {
                    call.answer(localStream); // Send camera stream to them
                    call.on('stream', () => {
                        senderStatus.style.display = 'block';
                    });
                });

                peer.on('error', (err) => {
                    if (err.type === 'unavailable-id') {
                        // In the rare event the 4-digit number is occupied right now, try another
                        genCodeBtn.click();
                    } else {
                        alert('Connection Error: ' + err.message);
                    }
                });

            } catch (err) {
                alert('Camera access denied or error occurred: ' + err.message);
            }
        });

        // --- RECEIVER LOGIC ---
        connectBtn.addEventListener('click', () => {
            const targetPin = pinInput.value.trim();
            if (targetPin.length !== 4) {
                return alert('Please enter a valid 4-digit PIN.');
            }

            connectBtn.disabled = true;
            pinInput.disabled = true;

            // Initialize receiver without a fixed ID (let system assign random ID to receiver)
            peer = new Peer();

            peer.on('open', () => {
                // Call the sender using their 4-digit code, sending an empty stream object
                const call = peer.call(targetPin, new MediaStream());
                
                call.on('stream', (remoteStream) => {
                    remoteVideo.srcObject = remoteStream;
                    remotePlaceholder.style.display = 'none';
                    receiverStatus.style.display = 'block';
                });

                // Fallback check if the stream fails to load
                setTimeout(() => {
                    if (!remoteVideo.srcObject) {
                        alert('Could not find stream. Verify the PIN is correct and broadcasting.');
                        connectBtn.disabled = false;
                        pinInput.disabled = false;
                    }
                }, 7000);
            });
        });
    </script>
</body>
</html>
